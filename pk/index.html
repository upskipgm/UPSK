    renderResults() {
        const ikpsi = this.calcIkpsi();
        const bfi = this.calcBfi();
        const a = this.answers.A;

        const percentages = [];
        Object.entries(IKPSI_DOMAINS).forEach(([key, domain]) => {
            const score = ikpsi[key];
            const maxScore = (domain.items.length + (domain.reverse?.length || 0)) * 5;
            percentages.push((score / maxScore) * 100);
        });
        
        const mean = percentages.reduce((sum, val) => sum + val, 0) / percentages.length;
        const variance = percentages.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / percentages.length;
        const stdDeviation = Math.sqrt(variance);
        const skorKeselarasan = Math.round(stdDeviation);
        const keselarasanColor = skorKeselarasan <= 40 ? "text-green-700 bg-green-50 border border-green-200" : "text-red-700 bg-red-50 border border-red-200";

                                <span class="font-medium text-slate-500">${domain.label}</span>
                                <span class="font-bold text-slate-800">${pct}%</span>
                            </div>`;
                        });

        html += `       </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-md font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-3">
                    <span class="w-7 h-7 bg-indigo-100 rounded-lg flex items-center justify-center text-xs font-bold text-indigo-700">C</span>
                    Bahagian C: Keputusan Personaliti — Big Five Inventory (BFI)
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;

        Object.entries(bfi).forEach(([key, score]) => {
            const pct = Math.round(((score - 10) / 40) * 100);
            const level = pct >= 67 ? 'Tinggi' : pct >= 34 ? 'Sederhana' : 'Rendah';
            const color = key === 'N' ? (pct >= 67 ? 'bg-red-500' : pct >= 34 ? 'bg-yellow-400' : 'bg-green-500') : (pct >= 67 ? 'bg-indigo-500' : pct >= 34 ? 'bg-blue-400' : 'bg-slate-400');

            html += `<div class="border border-slate-200 rounded-xl p-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-semibold text-slate-700 text-sm">${BFI_LABELS[key]}</span>
                    <span class="text-sm font-bold text-indigo-600">${level}</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 mb-1.5">
                    <div class="${color} h-2 rounded-full transition-all" style="width:${pct}%"></div>
                </div>
                <div class="flex justify-between text-xs text-slate-400"><span>${score} / 50</span><span>${pct}%</span></div>
            </div>`;

        html += `</div></div>`;

        html += `<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">

            </h3>

                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Nama</span><span class="font-medium text-slate-700">${a.nama || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">No. Kad Pengenalan</span><span class="font-medium text-slate-700">${a.kad_pengenalan || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">No. Matrik</span><span class="font-medium text-slate-700">${a.no_matrik || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Emel</span><span class="font-medium text-slate-700">${a.emel || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Jantina</span><span class="font-medium text-slate-700">${a.jantina || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Bangsa</span><span class="font-medium text-slate-700">${a.bangsa || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Agama</span><span class="font-medium text-slate-700">${a.agama || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">No. Telefon</span><span class="font-medium text-slate-700">${a.telefon || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100 md:col-span-2"><span class="text-slate-500">IPG Kampus</span><span class="font-medium text-slate-700 text-right">${a.ipg || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Program</span><span class="font-medium text-slate-700">${a.program || '-'}</span></div>
                <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Bidang</span><span class="font-medium text-slate-700">${a.bidang || '-'}</span></div>
            </div>
        </div>

        <div class="no-print flex flex-wrap justify-center items-center gap-4 bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
            <button onclick="app.downloadPDF()" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg text-sm shadow flex items-center gap-2 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Muat Turun PDF
            </button>
            <button onclick="app.resetInventory()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-sm flex items-center gap-2 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5M4 4h5v.582"/></svg>
                Jawab Semula
            </button>
        </div>

        <div class="text-center text-xs text-slate-400 pt-2 pb-8">
            <p>Penafian: Slip laporan ini dijana secara automatik. Sila hubungi Unit Psikologi dan Kaunseling di IPG Kampus anda untuk maklumat lanjut.</p>
        </div>
        </div>`;

        document.getElementById('main-content').innerHTML = html;
        this.hideNav(); this.hideProgress();

        setTimeout(() => {
            const ctx = document.getElementById('ikpsiRadarChart').getContext('2d');
            const labels = [];
            const dataValues = [];
            Object.entries(IKPSI_DOMAINS).forEach(([key, domain]) => {
                labels.push(domain.label);
                const score = ikpsi[key];
                const maxScore = (domain.items.length + (domain.reverse?.length || 0)) * 5;
                dataValues.push(Math.round((score / maxScore) * 100));
            });

            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Peratusan Skor Kesejahteraan (%)',
                        data: dataValues,
                        backgroundColor: 'rgba(16, 185, 129, 0.2)',
                        borderColor: 'rgba(16, 185, 129, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(16, 185, 129, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',

                },

                    responsive: true,
                    maintainAspectRatio: false,

    notify(type, title, message) {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        const isSuccess = type === 'success';
        toast.className = `app-toast ${isSuccess ? 'success' : 'error'}`;
        toast.setAttribute('role', isSuccess ? 'status' : 'alert');
        toast.innerHTML = `
            <svg class="toast-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                ${isSuccess
                    ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>'
                    : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>'}
            </svg>
            <div><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`;
        container.appendChild(toast);
        window.setTimeout(() => {
            toast.classList.add('toast-out');
            window.setTimeout(() => toast.remove(), 240);
        }, 4200);
    },

    showValidation(message, selector) {
        const target = selector ? document.querySelector(selector) : null;
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            const box = target.closest('.question-row, div');
            if (box) {
                box.classList.add('ring-2','ring-red-200','border-red-400');
                setTimeout(() => box.classList.remove('ring-2','ring-red-200','border-red-400'), 1800);
            }
        }
        this.notify('error', 'Maklumat belum lengkap', message);
    },

    async next() {
        if (this.phase === 'register') {
            if (!this.validateRegister()) return;
            this.saveRegister();
            this.phase = 'inventory';
            this.section = 0;
            this.renderInventoryPage();
            this.updateProgress();
            return;
        }
        if (this.phase === 'inventory') {
            if (!this.validateInventory()) return;
            const totalIkpsiPages = Math.ceil(IKPSI_ITEMS.length / ITEMS_PER_PAGE);
            const totalBfiPages = Math.ceil(BFI_ITEMS.length / ITEMS_PER_PAGE);
            const totalPages = totalIkpsiPages + totalBfiPages;
            if (this.section < totalPages - 1) {
                this.section++;
                this.renderInventoryPage();
                this.updateProgress();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                await this.submitCompletedRecord();
                this.phase = 'results';
                this.renderResults();
                this.openModal('modal-complete');
            }
        }
    },

    prev() {
        if (this.phase === 'inventory' && this.section > 0) {
            this.section--;
            this.renderInventoryPage();
            this.updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (this.phase === 'inventory' && this.section === 0) {
            this.phase = 'register';
            this.renderRegister();
            this.updateProgress();
        }
    },

    validateRegister() {
        for (const q of DEMO_QUESTIONS) {
            if (!q.required) continue;
            let val = q.type === 'radio' ? document.querySelector(`input[name="a_${q.id}"]:checked`)?.value : document.getElementById(`a_${q.id}`)?.value;
            if (!val || !val.trim()) { this.showValidation(`Sila lengkapkan: ${q.label}`, q.type === 'radio' ? `input[name="a_${q.id}"]` : `#a_${q.id}`); return false; }
        }
        return true;
    },

    validateInventory() {
        const totalIkpsiPages = Math.ceil(IKPSI_ITEMS.length / ITEMS_PER_PAGE);
        if (this.section < totalIkpsiPages) {
            const startIdx = this.section * ITEMS_PER_PAGE;
            const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, IKPSI_ITEMS.length);
            for (let i = startIdx; i < endIdx; i++) {
                if (!document.querySelector(`input[name="b_${i}"]:checked`)) {
                    this.showValidation(`Sila jawab item IKPsi-P ${i+1} sebelum ke muka seterusnya.`, `input[name="b_${i}"]`);
                    return false;
                }
            }
        } else {
            const bfiSection = this.section - totalIkpsiPages;
            const startIdx = bfiSection * ITEMS_PER_PAGE;
            const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, BFI_ITEMS.length);
            for (let i = startIdx; i < endIdx; i++) {
                if (!document.querySelector(`input[name="c_${i}"]:checked`)) {
                    this.showValidation(`Sila jawab item Personaliti ${i+1} sebelum ke muka seterusnya.`, `input[name="c_${i}"]`);
                    return false;
                }
            }
        }
        return true;
    },

    saveRegister() {
        DEMO_QUESTIONS.forEach(q => {
            if (q.type === 'radio') {
                const el = document.querySelector(`input[name="a_${q.id}"]:checked`);
                if (el) this.answers.A[q.id] = el.value;
            } else {
                const el = document.getElementById(`a_${q.id}`);
                if (el) this.answers.A[q.id] = el.value;
            }
        });
    },

    saveB(idx, val) { this.answers.B[idx] = parseInt(val); },
    saveC(idx, val) { this.answers.C[idx] = parseInt(val); },

    calcIkpsi() {
        const scores = {};
        Object.entries(IKPSI_DOMAINS).forEach(([key, domain]) => {
            let total = 0;
            domain.items.forEach(idx => { total += this.answers.B[idx - 1] || 3; });
            (domain.reverse || []).forEach(idx => { total += 6 - (this.answers.B[idx - 1] || 3); });
            scores[key] = total;
        });
        return scores;
    },

    calcBfi() {
        const scores = { E: 0, A: 0, C: 0, N: 0, O: 0 };
        BFI_KEYS.forEach((key, idx) => {
            const v = this.answers.C[idx] || 3;
            scores[key[0]] += (key[1] === '+') ? v : (6 - v);
        });
        return scores;
    },

    async submitCompletedRecord() {
        this.notify('info', 'Sedang Dihantar', 'Sila tunggu, maklumat anda sedang direkodkan...');

        const ikpsi = this.calcIkpsi();
        const bfi = this.calcBfi();
        const a = this.answers.A;

        const getTahap = (pct) => pct >= 67 ? 'Tinggi' : pct >= 34 ? 'Sederhana' : 'Rendah';
        const getTahapKes = (pct) => pct >= 80 ? 'Tinggi' : pct >= 50 ? 'Sederhana' : 'Rendah';

        const domainPct = {};
        Object.entries(IKPSI_DOMAINS).forEach(([key, domain]) => {
            const maxScore = (domain.items.length + (domain.reverse?.length || 0)) * 5;
            domainPct[key] = Math.round((ikpsi[key] / maxScore) * 100);
        });

        const bfiPct = {};
        Object.entries(bfi).forEach(([key, score]) => {
            bfiPct[key] = Math.round(((score - 10) / 40) * 100);
        });

        const totalKes = Object.values(domainPct).reduce((sum, val) => sum + val, 0);
        const pctKes = Math.round(totalKes / 8);

        const percentages = Object.values(domainPct);
        const mean = percentages.reduce((sum, val) => sum + val, 0) / percentages.length;
        const variance = percentages.reduce((sum, val) => sum + Math.pow(val - mean, 2), 0) / percentages.length;
        const skorKeselarasan = Math.round(Math.sqrt(variance));

        const itemsB = [];
        for (let i = 0; i < 84; i++) itemsB.push(this.answers.B[i] !== undefined ? this.answers.B[i] : 0);

        const itemsC = [];
        for (let i = 0; i < 50; i++) itemsC.push(this.answers.C[i] !== undefined ? this.answers.C[i] : 0);

        const payload = {
            action: 'savepkpp',
            student: a,
            itemsB: itemsB,
            itemsC: itemsC,
            bfi: bfi,
            ikpsi: ikpsi,
            tahap: {
                bfi: { E: getTahap(bfiPct.E), A: getTahap(bfiPct.A), C: getTahap(bfiPct.C), N: getTahap(bfiPct.N), O: getTahap(bfiPct.O) },
                ikpsi: { 
                    emosi: getTahapKes(domainPct.emosi), kendiri: getTahapKes(domainPct.kendiri), 
                    fizikal: getTahapKes(domainPct.fizikal), perhubungan: getTahapKes(domainPct.perhubungan), 
                    intelektual: getTahapKes(domainPct.intelektual), spiritual: getTahapKes(domainPct.spiritual), 
                    identiti: getTahapKes(domainPct.identiti), kewangan: getTahapKes(domainPct.kewangan) 
                },
                keselarasanSkor: skorKeselarasan,
                keselarasanTahap: skorKeselarasan <= 40 ? "Selaras" : "Tidak Selaras",
                totalKes: totalKes,
                pctKes: pctKes
            }
        };

        try {
            await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            this.notify('success', 'Berjaya Dihantar', 'Maklumat PKPP dan 134 skor item telah direkodkan.');
        } catch (error) {
            this.notify('error', 'Gagal Dihantar', 'Sila semak sambungan internet anda.');
        }
    },

    resetInventory() {
        this.phase = 'welcome';
        this.section = 0;
        this.answers = { A:{}, B:{}, C:{} };
        this.renderWelcome();
    },

    showNav() { document.getElementById('nav-container').classList.remove('hidden'); },
    hideNav() { document.getElementById('nav-container').classList.add('hidden'); },
    showProgress() { document.getElementById('progress-bar-container').classList.remove('hidden'); },
    hideProgress() { document.getElementById('progress-bar-container').classList.add('hidden'); },

    updateProgress() {
        const totalIkpsiPages = Math.ceil(IKPSI_ITEMS.length / ITEMS_PER_PAGE);
        const totalBfiPages = Math.ceil(BFI_ITEMS.length / ITEMS_PER_PAGE);
        const totalPages = totalIkpsiPages + totalBfiPages;
        let pct, label;
        if (this.phase === 'register') {
            pct = 5; label = 'Pendaftaran Maklumat';
        } else {
            pct = Math.round(((this.section + 1) / totalPages) * 95) + 5;
            if (this.section < totalIkpsiPages) label = `IKPsi-P — Muka ${this.section + 1} / ${totalIkpsiPages}`;
            else label = `Personaliti — Muka ${this.section - totalIkpsiPages + 1} / ${totalBfiPages}`;
        }
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-percent').textContent = pct + '%';
        document.getElementById('progress-text').textContent = label;
        document.getElementById('btn-back').classList.toggle('hidden', this.phase === 'register' || (this.phase === 'inventory' && this.section === 0));
        const isLast = this.phase === 'inventory' && this.section === totalPages - 1;
        document.getElementById('btn-forward').innerHTML = isLast
            ? `<span class="flex items-center gap-2">Hantar & Lihat Keputusan<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></span>`
            : `<span class="flex items-center gap-2">Seterusnya<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></span>`;
    },

    openModal(id) { document.getElementById(id).classList.add('active'); },
    closeModal(id) { document.getElementById(id).classList.remove('active'); },

    async downloadPDF() {
        try {
            const element = document.getElementById('result-slip');
            if (!element) { this.notify('error', 'Ralat', 'Slip keputusan tidak dijumpai.'); return; }
            if (typeof html2pdf === 'undefined') { this.notify('error', 'Pustaka PDF Gagal Dimuatkan', 'Sila pastikan anda mempunyai sambungan internet yang stabil dan cuba semula.'); return; }
            const name = (this.answers.A.nama || 'PELAJAR').replace(/[^a-zA-Z0-9_-]+/g, '_');
            this.notify('info', 'Sila Tunggu', 'PDF sedang dijana, jangan tutup tetingkap ini...');
            await html2pdf().set({
                margin: [10, 10, 10, 10],
                filename: `SLIP_PKPP_${name}.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            }).from(element).save();
        } catch (error) {
            console.error("PDF Error:", error);
            this.notify('error', 'Gagal Jana PDF', 'Berlaku ralat. Sila pastikan anda menggunakan pelayar Chrome/Firefox terkini.');
        }
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
