<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPG Sejahtera - Cloud Edition</title>
    <style>
        :root {
            --primary: #5c7cfa;
            --primary-light: #edf2ff;
            --secondary: #20c997;
            --secondary-light: #e6fcf5;
            --danger: #ff6b6b;
            --warning: #fcc419;
            --text-dark: #343a40;
            --text-muted: #868e96;
            --bg-soft: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background-color: var(--bg-soft); color: var(--text-dark); line-height: 1.6; }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 100vh; }

        .card { background: var(--white); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }

        .btn { display: inline-block; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; text-align: center; width: 100%; margin-bottom: 10px; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-ghost { background: transparent; color: var(--text-muted); font-size: 0.9rem; }
        .btn:disabled { background: #ced4da; cursor: not-allowed; }

        .tab-wrapper { display: flex; background: #e9ecef; padding: 5px; border-radius: 12px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--text-muted); background: none; }
        .tab-btn.active { background: var(--white); color: var(--primary); box-shadow: var(--shadow); }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #dee2e6; font-size: 1rem; }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-red { background: #fff5f5; color: var(--danger); }
        .badge-yellow { background: #fff9db; color: #f59f00; }
        .badge-green { background: #e6fcf5; color: var(--secondary); }

        .progress-bar-container { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-bar-fill { background: var(--primary); height: 100%; transition: 0.5s; }

        .mini-survey-item { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 10px; }
        .options-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .opt-btn { padding: 8px 2px; font-size: 0.7rem; border: 1px solid #ddd; background: white; border-radius: 5px; cursor: pointer; }
        .opt-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="width: 40px; height: 40px; border: 4px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 10px; font-weight: 600;">Sila tunggu...</p>
</div>

<div class="container">
    
    <!-- AUTH VIEW -->
    <section id="view-auth" class="view active">
        <div class="text-center" style="margin-top: 40px;">
            <div style="font-size: 3.5rem;">🌱</div>
            <h1>IPG Sejahtera</h1>
            <p style="color:var(--primary); font-weight:600;">Pantau, Sokong, Pulih Bersama (Cloud)</p>
        </div>

        <div class="tab-wrapper">
            <button class="tab-btn active" onclick="switchAuthTab('pelajar')">Pelajar</button>
            <button class="tab-btn" onclick="switchAuthTab('kaunselor')">Kaunselor</button>
        </div>

        <div id="auth-pelajar" class="auth-content">
            <div class="card">
                <h3>Log Masuk Pelajar</h3>
                <div class="form-group">
                    <label>Angka Giliran</label>
                    <input type="text" id="login-student-id" placeholder="2023xxxxxx">
                </div>
                <button class="btn btn-primary" onclick="studentSync()">Masuk & Sinkronisasi</button>
            </div>
        </div>

        <div id="auth-kaunselor" class="auth-content" style="display:none;">
            <div class="card">
                <h3>Akses Kaunselor</h3>
                <div class="form-group">
                    <label>ID Kaunselor</label>
                    <input type="text" id="login-counselor-id" placeholder="ID Kakitangan">
                </div>
                <div class="form-group">
                    <label>Kata Laluan</label>
                    <input type="password" id="login-counselor-pwd" placeholder="********">
                </div>
                <button class="btn btn-secondary" onclick="counselorLogin()">Log Masuk</button>
            </div>
        </div>
    </section>

    <!-- STUDENT DASHBOARD -->
    <section id="view-student-dash" class="view">
        <nav style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:bold; color:var(--primary);">IPG Sejahtera</div>
            <button class="btn-ghost" onclick="logout()">Log Keluar</button>
        </nav>
        
        <div class="card" id="student-profile-card"></div>

        <div class="card">
            <h3>Status Kemajuan</h3>
            <div id="student-progress-area"></div>
            <button class="btn btn-ghost" style="margin-top:10px;" onclick="advanceDay()">Simulasi Hari Seterusnya (Debug)</button>
        </div>

        <div id="student-action-area"></div>
    </section>

    <!-- FULL ASSESSMENT -->
    <section id="view-assessment" class="view">
        <div class="card">
            <h3 id="assessment-title">Saringan Keadaan Emosi</h3>
            <div id="assessment-items-container"></div>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="submitAssessment()">Hantar Saringan</button>
        </div>
    </section>

    <!-- ACTIVITY VIEW -->
    <section id="view-activity" class="view">
        <nav style="margin-bottom:20px;"><button class="btn-ghost" onclick="showView('view-student-dash')">← Batal</button></nav>
        <div id="activity-container"></div>
    </section>

    <!-- COUNSELOR DASHBOARD -->
    <section id="view-counselor-dash" class="view">
        <nav style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="font-weight:bold;">Portal Kaunselor (Real-time)</div>
            <button class="btn-ghost" onclick="logout()">Keluar</button>
        </nav>
        <button class="btn btn-primary" onclick="openAddStudent()">+ Tambah Pelajar</button>
        <div class="card">
            <h3>Senarai Klien Berisiko</h3>
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                    <thead><tr style="text-align:left; border-bottom:1px solid #eee;"><th>ID</th><th>Risiko</th><th>Hari</th><th>Skor</th></tr></thead>
                    <tbody id="counselor-student-list"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- FORM ADD -->
    <section id="view-edit-student" class="view">
        <nav style="margin-bottom:20px;"><button class="btn-ghost" onclick="showView('view-counselor-dash')">← Batal</button></nav>
        <div class="card">
            <h3>Daftar Pelajar Baharu</h3>
            <div class="form-group"><label>Angka Giliran (Sebagai ID)</label><input type="text" id="edit-id"></div>
            <div class="form-group"><label>Nama Penuh</label><input type="text" id="edit-name"></div>
            <div class="form-group"><label>Program</label><input type="text" id="edit-program"></div>
            <button class="btn btn-secondary" onclick="saveNewStudent()">Daftar ke Firestore</button>
        </div>
    </section>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE CONFIG ---
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'ipg-sejahtera-demo';

    let currentUserData = null;
    let unsubscribeCounselor = null;

    const QUESTIONS = [
        "Sentiasa teringat kejadian itu secara tiba-tiba.",
        "Sering termenung atau kelihatan 'hilang dalam fikiran'.",
        "Sukar untuk memulakan tidur.",
        "Mengalami mimpi buruk berkaitan kejadian.",
        "Tindak balas emosi melampau (menangis, panik) tanpa sebab.",
        "Mengelak bercakap tentang insiden atau tempat berkaitan.",
        "Enggan/takut ke sekolah atau kawasan tertentu.",
        "Hilang minat terhadap aktiviti yang diminati.",
        "Menyendiri, kurang bergaul dengan rakan/keluarga.",
        "Nampak murung, tidak bermotivasi.",
        "Menyalahkan diri sendiri atau orang lain.",
        "Mudah terkejut (startle response).",
        "Sukar tidur / sering letih di sekolah.",
        "Cepat marah, mudah naik angin."
    ];

    // --- AUTH INITIALIZATION ---
    async function startApp() {
        toggleLoading(true);
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (e) {
            console.error("Auth Error", e);
        }
        toggleLoading(false);
    }
    startApp();

    // --- UI HELPERS ---
    window.switchAuthTab = (tab) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-content').forEach(c => c.style.display = 'none');
        if(tab==='pelajar') {
            document.querySelector('.tab-btn:first-child').classList.add('active');
            document.getElementById('auth-pelajar').style.display = 'block';
        } else {
            document.querySelector('.tab-btn:last-child').classList.add('active');
            document.getElementById('auth-kaunselor').style.display = 'block';
        }
    };

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    };

    function toggleLoading(show) {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }

    // --- STUDENT CLOUD LOGIC ---
    window.studentSync = async () => {
        const id = document.getElementById('login-student-id').value.trim();
        if(!id) return alert("Sila isi Angka Giliran.");
        
        toggleLoading(true);
        const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', id);
        const snap = await getDoc(studentRef);

        if(snap.exists()) {
            currentUserData = { id, ...snap.data() };
            renderDashboard();
            showView('view-student-dash');
        } else {
            alert("ID Pelajar tidak dijumpai dalam rekod Firestore.");
        }
        toggleLoading(false);
    };

    function renderDashboard() {
        const s = currentUserData;
        document.getElementById('student-profile-card').innerHTML = `<h2>Hai, ${s.nickname || s.name}</h2><p class="text-small">ID: ${s.id}</p>`;
        
        let rClass = s.risk === 'Stabil' ? 'badge-green' : (s.risk === 'Sederhana' ? 'badge-yellow' : (s.risk === 'Tinggi' ? 'badge-red' : 'badge-ghost'));
        document.getElementById('student-progress-area').innerHTML = `
            <div style="display:flex; justify-content:space-between;"><span class="badge ${rClass}">${s.risk}</span><span class="text-small">Hari ${s.currentDay}/14</span></div>
            <div class="progress-bar-container"><div class="progress-bar-fill" style="width:${(s.currentDay/14)*100}%"></div></div>
        `;

        const action = document.getElementById('student-action-area');
        if(s.currentDay === 1 && s.risk === "Belum Disaring") {
            action.innerHTML = `<button class="btn btn-primary" onclick="initAssessment('pra')">Mula Saringan Pra (Hari 1)</button>`;
        } else if(s.currentDay === 14) {
            action.innerHTML = `<button class="btn btn-primary" onclick="initAssessment('pasca')">Mula Saringan Pasca (Hari 14)</button>`;
        } else if(s.currentDay % 2 === 0 && (!s.completedActivities || !s.completedActivities.includes(s.currentDay))) {
            action.innerHTML = `<button class="btn btn-primary" onclick="loadActivity(${s.currentDay})">Teruskan Aktiviti Hari ${s.currentDay}</button>`;
        } else {
            action.innerHTML = `<div class="card text-center"><p>Tiada aktiviti khusus hari ini. Amalkan penjagaan kendiri.</p></div>`;
        }
    }

    // --- ASSESSMENT LOGIC (Cloud Write) ---
    let tempAnswers = [];
    window.initAssessment = (type) => {
        showView('view-assessment');
        document.getElementById('assessment-title').innerText = type === 'pra' ? "Saringan Pra (Hari 1)" : "Saringan Pasca (Hari 14)";
        const container = document.getElementById('assessment-items-container');
        container.innerHTML = '';
        tempAnswers = new Array(QUESTIONS.length).fill(null);

        QUESTIONS.forEach((q, i) => {
            const item = document.createElement('div');
            item.style.marginBottom = "15px";
            item.innerHTML = `<p class="text-small"><strong>${i+1}.</strong> ${q}</p>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:5px;">
                    ${[0,1,2,3].map(v => `<button class="opt-btn" id="full_${i}_${v}" onclick="setFullAns(${i},${v})">${['Tak','Sikit','Kerap','S.Kerap'][v]}</button>`).join('')}
                </div>`;
            container.appendChild(item);
        });
    };

    window.setFullAns = (q, v) => {
        tempAnswers[q] = v;
        for(let i=0; i<4; i++) {
            const el = document.getElementById(`full_${q}_${i}`);
            if(el) el.classList.remove('active');
        }
        document.getElementById(`full_${q}_${v}`).classList.add('active');
    };

    window.submitAssessment = async () => {
        if(tempAnswers.includes(null)) return alert("Sila lengkapkan semua soalan.");
        toggleLoading(true);
        const score = tempAnswers.reduce((a,b)=>a+b, 0);
        let risk = score >= 27 ? "Tinggi" : (score >= 13 ? "Sederhana" : "Stabil");
        
        const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', currentUserData.id);
        await updateDoc(studentRef, { risk, score, lastUpdated: new Date() });
        
        currentUserData.risk = risk;
        currentUserData.score = score;
        
        toggleLoading(false);
        alert(`Berjaya! Keputusan: ${risk.toUpperCase()} (Skor: ${score}/42)`);
        renderDashboard();
        showView('view-student-dash');
    };

    // --- ACTIVITY LOGIC (Cloud Write) ---
    let miniAnswers = [];
    window.loadActivity = (day) => {
        showView('view-activity');
        miniAnswers = new Array(3).fill(null);
        const container = document.getElementById('activity-container');
        const miniIndices = [0, 9, 13];

        container.innerHTML = `
            <div class="card">
                <h3>Ujian Ringkas (Hari ${day})</h3>
                <div id="mini-survey-area"></div>
                <button class="btn btn-primary" id="btn-start-act" disabled onclick="startTherapy(${day})">Teruskan ke Aktiviti</button>
            </div>
        `;

        const surveyArea = document.getElementById('mini-survey-area');
        miniIndices.forEach((qIdx, i) => {
            const div = document.createElement('div');
            div.className = "mini-survey-item";
            div.innerHTML = `<p class="text-small"><strong>${i+1}.</strong> ${QUESTIONS[qIdx]}</p>
                <div class="options-row">
                    ${[0,1,2,3].map(v => `<button class="opt-btn" id="mini_${i}_${v}" onclick="setMiniAns(${i},${v})">${['Tak','Sikit','Kerap','S.Kerap'][v]}</button>`).join('')}
                </div>`;
            surveyArea.appendChild(div);
        });
    };

    window.setMiniAns = (q, v) => {
        miniAnswers[q] = v;
        for(let i=0; i<4; i++) {
            const el = document.getElementById(`mini_${q}_${i}`);
            if(el) el.classList.remove('active');
        }
        document.getElementById(`mini_${q}_${v}`).classList.add('active');
        if(!miniAnswers.includes(null)) document.getElementById('btn-start-act').disabled = false;
    };

    window.startTherapy = (day) => {
        const container = document.getElementById('activity-container');
        const acts = {
            2: { t: "Pernafasan 4-4-6", d: "Stabilkan emosi dengan bernafas secara teratur." },
            4: { t: "Mengenal Fikiran", d: "Tuliskan fikiran yang mengganggu anda." },
            6: { t: "Reframe Minda", d: "Cari sudut positif dalam situasi sukar." },
            8: { t: "Pilihan Tindakan", d: "Pilih satu aktiviti yang memberi ketenangan." },
            10: { t: "Label Emosi", d: "Namakan apa yang anda rasa hari ini." },
            12: { t: "Hubungan Sosial", d: "Tegur rakan yang anda percayai." }
        };
        const active = acts[day] || { t: "Latihan Kendiri", d: "Teruskan pemulihan." };
        container.innerHTML = `
            <div class="card">
                <h3>${active.t}</h3><p>${active.d}</p>
                <textarea id="ref-text" style="margin-top:15px;" placeholder="Tulis refleksi anda..."></textarea>
                <button class="btn btn-secondary" style="margin-top:10px;" onclick="finishActivity(${day})">Simpan & Selesai</button>
            </div>
        `;
    };

    window.finishActivity = async (day) => {
        const ref = document.getElementById('ref-text').value;
        if(ref.length < 5) return alert("Sila tulis refleksi ringkas.");
        toggleLoading(true);
        const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', currentUserData.id);
        const completed = currentUserData.completedActivities || [];
        if(!completed.includes(day)) completed.push(day);
        
        await updateDoc(studentRef, { completedActivities: completed });
        currentUserData.completedActivities = completed;
        toggleLoading(false);
        renderDashboard();
        showView('view-student-dash');
    };

    window.advanceDay = async () => {
        currentUserData.currentDay++;
        if(currentUserData.currentDay > 14) currentUserData.currentDay = 14;
        const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', currentUserData.id);
        await updateDoc(studentRef, { currentDay: currentUserData.currentDay });
        renderDashboard();
    };

    // --- COUNSELOR CLOUD LOGIC (Real-time) ---
    window.counselorLogin = () => {
        if(document.getElementById('login-counselor-id').value==='KAUNSELOR' && document.getElementById('login-counselor-pwd').value==='admin123') {
            startCounselorListener();
            showView('view-counselor-dash');
        } else alert("Salah ID/Kata Laluan.");
    };

    function startCounselorListener() {
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'students');
        unsubscribeCounselor = onSnapshot(q, (snap) => {
            const tbody = document.getElementById('counselor-student-list');
            tbody.innerHTML = '';
            snap.forEach(doc => {
                const s = doc.data();
                const id = doc.id;
                let rClass = s.risk === 'Stabil' ? 'badge-green' : (s.risk === 'Sederhana' ? 'badge-yellow' : 'badge-red');
                tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;">
                    <td style="padding:10px;">${id}</td>
                    <td><span class="badge ${rClass}">${s.risk}</span></td>
                    <td>H${s.currentDay}</td>
                    <td>${s.score || 0}/42</td>
                </tr>`;
            }, (err) => console.error(err));
        });
    }

    window.openAddStudent = () => showView('view-edit-student');

    window.saveNewStudent = async () => {
        const id = document.getElementById('edit-id').value.trim();
        const name = document.getElementById('edit-name').value;
        if(!id || !name) return alert("Sila lengkapkan maklumat.");
        
        toggleLoading(true);
        const studentRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', id);
        await setDoc(studentRef, { 
            name, nickname: name.split(' ')[0], currentDay: 1, 
            risk: "Belum Disaring", score: 0, completedActivities: [],
            program: document.getElementById('edit-program').value,
            createdAt: new Date() 
        });
        toggleLoading(false);
        alert("Pelajar berjaya didaftarkan dalam Firestore!");
        showView('view-counselor-dash');
    };

    window.logout = () => {
        if(unsubscribeCounselor) unsubscribeCounselor();
        currentUserData = null;
        showView('view-auth');
    };

</script>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
