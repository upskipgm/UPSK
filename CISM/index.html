<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISM IPGKPM - Saringan Kesejahteraan Emosi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .step-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn.selected {
            background-color: #1e40af;
            color: white;
            border-color: #1e40af;
            transform: scale(1.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        #loader {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Paparan Loading -->
    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-blue-900 text-lg">Menghantar Data...</p>
        <p class="text-slate-500 text-sm">Sila tunggu sebentar sementara rekod disimpan.</p>
    </div>

    <div class="max-w-2xl mx-auto py-8 px-4">
        <!-- Pengepala (Header) -->
        <header class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-blue-900 tracking-tight">CISM IPGKPM</h1>
            <p class="text-slate-500 font-medium mt-1">Saringan Kesejahteraan Emosi Digital</p>
        </header>

        <!-- Langkah 1: Demografi -->
        <div id="step1" class="step-content active bg-white rounded-2xl shadow-md p-8 border border-slate-100">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">1</div>
                <h2 class="text-xl font-bold text-slate-800">Maklumat Demografi</h2>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Penuh</label>
                    <input type="text" id="nama" class="w-full rounded-xl border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 p-3 border" placeholder="Masukkan nama penuh">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Kategori</label>
                    <select id="kategori" onchange="kemaskiniInputPelajar()" class="w-full rounded-xl border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-500 p-3 border bg-white">
                        <option value="Pelajar">Pelajar</option>
                        <option value="Pensyarah">Pensyarah</option>
                        <option value="Pegawai">Pegawai</option>
                        <option value="AKP">AKP</option>
                    </select>
                </div>

                <!-- Ruangan Pelajar (Disorok jika bukan pelajar) -->
                <div id="ruangan-pelajar" class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Tahun Ambilan</label>
                        <input type="text" id="tahun" class="w-full rounded-xl border-slate-200 shadow-sm p-3 border" placeholder="Cth: 2024">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Kelas</label>
                        <input type="text" id="kelas" class="w-full rounded-xl border-slate-200 shadow-sm p-3 border" placeholder="Cth: PISMP BM 1">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">No. Telefon</label>
                    <input type="tel" id="nofon" class="w-full rounded-xl border-slate-200 shadow-sm p-3 border" placeholder="01XXXXXXXX">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">E-mel</label>
                    <input type="email" id="emel" class="w-full rounded-xl border-slate-200 shadow-sm p-3 border" placeholder="nama@ipgm.edu.my">
                </div>

                <button onclick="keLangkah(2)" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all mt-4">
                    Seterusnya: Jawab Soalan
                </button>
            </div>
        </div>

        <!-- Langkah 2: Saringan -->
        <div id="step2" class="step-content bg-white rounded-xl shadow-md p-6 border border-slate-100">
            <div class="mb-6 border-b border-slate-100 pb-4">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold">2</div>
                    <h2 class="text-xl font-bold text-slate-800">Saringan Emosi</h2>
                </div>
                
                <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100 text-left">
                    <p class="text-xs font-bold text-indigo-800 uppercase mb-2 tracking-wider underline">Petunjuk Skala Jawapan:</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs font-semibold text-indigo-900">
                        <div>1: Tidak Pernah</div>
                        <div>2: Jarang</div>
                        <div>3: Kadang-kadang</div>
                        <div>4: Kerap</div>
                        <div>5: Sangat Kerap</div>
                    </div>
                </div>
            </div>

            <div id="container-soalan" class="space-y-12">
                <!-- Kandungan soalan akan dijanakan secara dinamik oleh binaSoalan() -->
            </div>

            <button onclick="prosesDanHantar()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-5 rounded-xl shadow-lg shadow-emerald-100 transition-all mt-10 uppercase tracking-widest">
                Hantar Jawapan
            </button>
        </div>

        <!-- Langkah 3: Keputusan -->
        <div id="step3" class="step-content bg-white rounded-xl shadow-md p-10 border border-slate-100 text-center">
            <div id="ikon-keputusan" class="mx-auto w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 shadow-sm"></div>
            
            <h2 class="text-2xl font-extrabold text-slate-900">Keputusan Saringan</h2>
            <p id="info-pengguna" class="text-slate-600 font-medium mb-8"></p>

            <div class="bg-slate-50 rounded-3xl p-8 mb-8 border border-slate-100">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Skor Kesejahteraan</span>
                <div id="skor-akhir" class="text-7xl font-black text-slate-900 my-4 leading-none">0</div>
                <div id="status-tahap" class="inline-block px-6 py-2 rounded-full font-bold text-lg"></div>
            </div>

            <div id="nasihat-kaunseling" class="text-left p-6 rounded-2xl mb-8 leading-relaxed border-l-4 shadow-inner"></div>
            
            <div id="status-sync" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-6 py-2 px-4 bg-slate-50 rounded-lg inline-block"></div>

            <button onclick="location.reload()" class="w-full py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">
                Mula Baharu
            </button>
        </div>
    </div>

    <script>
        // URL Google Script anda
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_WcMKfQO98LCAiZzI4AhldQ2FFHhtGO2c_xobFGUlZoMm9KwMAHWC8QvBpd8ElXBjGg/exec";

        const setA = ["Saya berasa gelisah tanpa sebab jelas", "Saya mudah rasa sedih atau kosong", "Saya cepat rasa marah atau terganggu", "Saya sukar menenangkan diri"];
        const setB = ["Saya sukar tidur", "Saya rasa letih walaupun tidak banyak aktiviti", "Saya rasa tegang dalam badan"];
        const setC = ["Saya sukar fokus", "Saya kurang berminat aktiviti biasa", "Saya lebih suka bersendirian"];
        const setD = ["Saya rasa emosi saya membebankan", "Saya perlukan seseorang untuk bercakap"];

        const jawapan = {};

        function kemaskiniInputPelajar() {
            const kat = document.getElementById('kategori').value;
            document.getElementById('ruangan-pelajar').style.display = (kat === 'Pelajar') ? 'grid' : 'none';
        }

        function binaSoalan() {
            const container = document.getElementById('container-soalan');
            container.innerHTML = ''; 

            const render = (items, targetId, title, prefix, isLikert) => {
                const sectionDiv = document.createElement('div');
                sectionDiv.className = "space-y-6";
                
                let html = `<h3 class="font-extrabold text-blue-900 border-b-2 border-blue-600/10 pb-3 mb-6 text-xl flex items-center gap-2">
                    <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                    ${title}
                </h3>`;
                
                items.forEach((q, idx) => {
                    html += `
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                            <p class="text-base font-semibold text-slate-800 mb-4">${idx+1}. ${q}</p>
                            <div class="flex gap-2 flex-wrap">
                                ${isLikert ? [1,2,3,4,5].map(v => `
                                    <button onclick="pilih('${prefix}${idx}', ${v}, this)" 
                                        class="option-btn w-12 h-12 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold flex items-center justify-center hover:border-blue-400 hover:text-blue-600" 
                                        data-group="${prefix}${idx}">${v}</button>
                                `).join('') : ['Ya', 'Tidak'].map(v => `
                                    <button onclick="pilih('${prefix}${idx}', '${v}', this)" 
                                        class="option-btn flex-1 py-3 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold hover:border-blue-400 hover:text-blue-600" 
                                        data-group="${prefix}${idx}">${v}</button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                sectionDiv.innerHTML = html;
                container.appendChild(sectionDiv);
            };

            render(setA, 'sectionA', 'Bahagian A: Perasaan Dalaman', 'a', true);
            render(setB, 'sectionB', 'Bahagian B: Fizikal & Tenaga', 'b', true);
            render(setC, 'sectionC', 'Bahagian C: Fungsi Harian', 'c', true);
            render(setD, 'sectionD', 'Bahagian D: Soalan Tambahan', 'd', false);
        }

        function pilih(group, val, btn) {
            jawapan[group] = val;
            document.querySelectorAll(`[data-group="${group}"]`).forEach(b => {
                b.classList.remove('selected', 'bg-blue-600', 'text-white', 'border-blue-600', 'ring-2', 'ring-blue-100');
            });
            btn.classList.add('selected', 'bg-blue-600', 'text-white', 'border-blue-600', 'ring-2', 'ring-blue-100');
        }

        function keLangkah(n) {
            if (n === 2) {
                const nma = document.getElementById('nama').value.trim();
                const eml = document.getElementById('emel').value.trim();
                const kat = document.getElementById('kategori').value;
                if (!nma || !eml) return alert("Sila isi Nama dan E-mel anda.");
                if (kat === 'Pelajar' && (!document.getElementById('tahun').value || !document.getElementById('kelas').value)) {
                    return alert("Pelajar wajib mengisi maklumat Tahun Ambilan dan Kelas.");
                }
            }
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${n}`).classList.add('active');
            window.scrollTo(0,0);
        }

        async function prosesDanHantar() {
            let skor = 0;
            let lengkap = true;

            // Pengiraan skor A+B+C
            for(let i=0; i<setA.length; i++) if(jawapan[`a${i}`]) skor += jawapan[`a${i}`]; else lengkap = false;
            for(let i=0; i<setB.length; i++) if(jawapan[`b${i}`]) skor += jawapan[`b${i}`]; else lengkap = false;
            for(let i=0; i<setC.length; i++) if(jawapan[`c${i}`]) skor += jawapan[`c${i}`]; else lengkap = false;
            
            // Semakan soalan Ya/Tidak
            for(let i=0; i<setD.length; i++) if(!jawapan[`d${i}`]) lengkap = false;

            if (!lengkap) return alert("Sila pastikan SEMUA soalan dijawab sebelum menghantar.");

            let tahap = skor <= 20 ? "Stabil" : skor <= 35 ? "Sederhana" : "Tinggi";
            
            const payload = {
                timestamp: new Date().toLocaleString('ms-MY'),
                nama: document.getElementById('nama').value,
                kategori: document.getElementById('kategori').value,
                tahun: document.getElementById('tahun').value || '-',
                kelas: document.getElementById('kelas').value || '-',
                nofon: document.getElementById('nofon').value,
                emel: document.getElementById('emel').value,
                skor: skor,
                tahap: tahap,
                soalan_d1: jawapan['d0'],
                soalan_d2: jawapan['d1']
            };

            document.getElementById('loader').style.display = 'flex';

            try {
                // Menghantar data ke Google Sheets menggunakan fetch
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                document.getElementById('status-sync').innerText = "✅ Berjaya Disimpan Online";
                document.getElementById('status-sync').className += " text-green-600 bg-green-50";
            } catch (e) {
                console.error("Ralat Sync:", e);
                document.getElementById('status-sync').innerText = "❌ Gagal Sync (Rekod Tempatan Sahaja)";
                document.getElementById('status-sync').className += " text-red-600 bg-red-50";
            }

            document.getElementById('loader').style.display = 'none';
            paparKeputusan(skor, tahap);
        }

        function paparKeputusan(skor, tahap) {
            document.getElementById('info-pengguna').innerText = document.getElementById('nama').value;
            document.getElementById('skor-akhir').innerText = skor;
            
            const st = document.getElementById('status-tahap');
            const ikon = document.getElementById('ikon-keputusan');
            const adv = document.getElementById('nasihat-kaunseling');

            if (skor <= 20) {
                st.innerText = "STABIL";
                st.className = "inline-block px-6 py-2 rounded-full font-bold text-lg bg-emerald-100 text-emerald-700";
                ikon.className = "mx-auto w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 bg-emerald-50 text-emerald-600";
                ikon.innerHTML = "😊";
                adv.className = "text-left p-6 rounded-2xl mb-8 bg-emerald-50 text-emerald-900 border-l-4 border-emerald-500 shadow-sm";
                adv.innerHTML = "<strong>Tahniah!</strong> Kesejahteraan emosi anda berada pada tahap yang stabil. Teruskan amalan penjagaan diri (Self-care) untuk kesihatan mental yang optimum.";
            } else if (skor <= 35) {
                st.innerText = "SEDERHANA";
                st.className = "inline-block px-6 py-2 rounded-full font-bold text-lg bg-amber-100 text-amber-700";
                ikon.className = "mx-auto w-24 h-24 rounded-full flex items-center justify-center text-4xl mb-6 bg-amber-50 text-amber-600";
                ikon.innerHTML = "😐";
                adv.className = "text-left p-6 rounded-2xl mb-8 bg-amber-50 text-amber-900 border-l-4 border-amber-500 shadow-sm";
                adv.innerHTML = "<strong>Saranan:</strong> Tahap gangguan emosi anda berada pada tahap sederhana. Anda akan disantuni oleh pasukan CISM IPGKPM dengan kadar segera. Sekiranya memerlukan perkhidmatan lebih cepat, anda dialu-alukan ke bilik gerakan CISM.";
            } else {
                st.innerText = "TINGGI (BERISIKO)";
                st.className = "inline-block px-6 py-2 rounded-full font-bold text-lg bg-red-100 text-red-700";
                ikon.className = "mx-auto flex h-24 w-24 rounded-full mb-6 bg-red-50 text-red-600 items-center justify-center text-4xl font-bold";
                ikon.innerHTML = "🚨";
                adv.className = "text-left p-6 rounded-2xl mb-8 bg-red-50 text-red-900 border-l-4 border-red-500 font-bold shadow-md";
                adv.innerHTML = "<strong>INTERVENSI SEGERA:</strong> Skor anda menunjukkan tahap gangguan emosi yang tinggi. Anda akan disantuni oleh pasukan CISM IPGKPM dengan kadar segera. Sekiranya memerlukan perkhidmatan lebih cepat, anda dialu-alukan ke bilik gerakan CISM.";
            }
            keLangkah(3);
        }

        // Mulakan proses penjanaan soalan
        binaSoalan();
    </script>
</body>
</html>
