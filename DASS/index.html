<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASS21 - Depression Anxiety Stress Scale 21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Pautan PDF telah ditukar kepada versi yang lebih selamat -->
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .radio-circle:checked + div { background-color: #e11d48; border-color: #e11d48; color: white; transform: scale(1.12); box-shadow: 0 4px 14px rgba(225,29,72,0.35); }
        .progress-anim { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift { transition: all 0.2s ease; }
        .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; padding: 16px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: white; border-radius: 16px; max-width: 480px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; transform: scale(0.95); transition: transform 0.3s ease; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-header { padding: 20px 24px 0; text-align: center; flex-shrink: 0; }
        .modal-body { padding: 16px 24px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 16px 24px 20px; border-top: 1px solid #e2e8f0; flex-shrink: 0; }

        #toast-container { position: fixed; top: 22px; right: 22px; z-index: 300; width: min(390px, calc(100vw - 32px)); display: grid; gap: 10px; pointer-events: none; }
        .app-toast { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid; border-radius: 12px; background: white; box-shadow: 0 16px 35px rgba(15,23,42,.16); animation: toastIn .25s ease-out; pointer-events: auto; }
        .app-toast.success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .app-toast.error { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
        .app-toast.warning { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
        .app-toast.info { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
        .app-toast .toast-icon { width: 22px; height: 22px; flex: 0 0 auto; margin-top: 1px; }
        .app-toast .toast-title { font-size: .875rem; font-weight: 700; line-height: 1.25rem; }
        .app-toast .toast-message { font-size: .8rem; line-height: 1.2rem; margin-top: 1px; opacity: .92; }
        .app-toast.toast-out { opacity: 0; transform: translateX(18px); transition: all .22s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }

        :root {
            --primary: #9f1239;
            --primary-dark: #881337;
            --ink: #172033;
            --muted: #667085;
            --line: #dfe5ec;
            --canvas: #f5f7fa;
        }
        body { background: var(--canvas); color: var(--ink); }
        body::before { content: ''; position: fixed; inset: 0 0 auto 0; height: 4px; background: linear-gradient(90deg, var(--primary-dark), var(--primary)); z-index: 200; }

        /* CSS UNTUK HEADER GAMBAR */
        .custom-header {
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(16,24,40,.045);
            border: 1px solid var(--line);
            margin-bottom: 1.5rem;
            overflow: hidden; 
            padding: 0; 
        }
        .custom-header img {
            display: block;
            width: 100%;
            height: auto;
        }

        .question-row { display: grid !important; grid-template-columns: 36px minmax(0,1fr) auto; align-items: center !important; }
        @media (max-width: 767px) {
            .question-row { grid-template-columns: 28px minmax(0,1fr); gap: .5rem !important; }
            .question-row > div:last-child { grid-column: 1 / -1; justify-content: space-between; width: 100%; padding-top: .35rem; }
        }
    </style>
</head>
<body class="min-h-screen">
<div id="toast-container" class="no-print" aria-live="polite" aria-atomic="true"></div>
<div id="app" class="max-w-5xl mx-auto px-4 py-6 pb-24">

    <!-- HEADER DASS-21 (GAMBAR ANDA) -->
    <header class="custom-header">
        <img src="https://z-cdn-media.chatglm.cn/files/8e44804b-9c4a-40b8-bbbb-b5795e84b8d5.png?auth_key=1884455002-4dc2ac60270647138fb75f98f2879d1c-0-55a94f1b31d0f43d12fc45c20521f5bd" alt="Header DASS 21 - Ujian Psikologi">
    </header>

    <!-- PROGRESS BAR -->
    <div id="progress-bar-container" class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6 hidden">
        <div class="flex justify-between items-center mb-2">
            <span id="progress-text" class="text-sm font-semibold text-slate-700">Pendaftaran Maklumat</span>
            <span id="progress-percent" class="text-sm font-bold text-rose-600">0%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
            <div id="progress-fill" class="bg-rose-600 h-2.5 rounded-full progress-anim" style="width:0%"></div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="main-content"></main>

    <!-- NAVIGATION -->
    <nav id="nav-container" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 hidden no-print">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <button id="btn-back" onclick="app.prev()" class="px-5 py-2.5 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition hidden">
                <span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Kembali</span>
            </button>
            <div class="flex-1"></div>
            <button id="btn-forward" onclick="app.next()" class="px-6 py-2.5 bg-rose-600 text-white rounded-lg font-medium hover:bg-rose-700 transition shadow-lg shadow-rose-200">
                <span class="flex items-center gap-2">Seterusnya<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></span>
            </button>
        </div>
    </nav>
</div>

<!-- MODAL: SELESAI -->
<div id="modal-complete" class="modal-overlay">
    <div class="modal-box" style="max-width: 440px;">
        <div class="modal-header">
            <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-3">
                <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800">Ujian DASS-21 Selesai</h3>
            <p class="text-sm text-slate-500 mt-1">Sila muat turun slip keputusan rasmi anda.</p>
        </div>
        <div class="modal-footer flex gap-3 justify-center">
            <button onclick="app.closeModal('modal-complete'); app.downloadPDF();" class="px-6 py-2.5 bg-red-500 text-white rounded-lg font-medium hover:bg-red-600 transition flex items-center gap-2 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Muat Turun Slip (PDF)
            </button>
            <button onclick="app.closeModal('modal-complete')" class="px-5 py-2.5 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition text-sm">Lihat Paparan</button>
        </div>
    </div>
</div>

<script>
// ===================== DATA INVENTORI DASS-21 =====================
const DEMO_QUESTIONS = [
    { id:"nama", label:"NAMA PENUH", type:"text", required:true, placeholder:"Contoh: AHMAD BIN ABU" },
    { id:"kad_pengenalan", label:"NO. KAD PENGENALAN", type:"text", required:true, placeholder:"Contoh: 010203040506" },
    { id:"no_matrik", label:"NO. MATRIK / STAF", type:"text", required:true, placeholder:"Contoh: D20241001234" },
    { id:"emel", label:"EMEL", type:"email", required:true, placeholder:"Contoh: nama@ipg.edu.my" },
    { id:"jantina", label:"JANTINA", type:"radio", options:["LELAKI","PEREMPUAN"], required:true },
    { id:"kategori", label:"KATEGORI PENGUNA", type:"radio", options:["PELAJAR","PENSYARAH","PEGAWAI","STAF SOKONGAN"], required:true },
    { id:"ipg", label:"PILIH INSTITUT PENDIDIKAN GURU MALAYSIA KAMPUS", type:"select",
      options:["IPGMK TEMENGGONG IBRAHIM","IPGMK TUN HUSSEIN ONN","IPGMK PEREMPUAN MELAYU","IPGMK RAJA MELEWAR",
        "IPGMK PENDIDIKAN TEKNIK","IPGMK PENDIDIKAN ISLAM","IPGMK ILMU KHAS","IPGMK BAHASA MELAYU",
        "IPGMK BAHASA ANTARABANGSA","IPGMK IPOH","IPGMK DARULAMAN","IPGMK PERLIS","IPGMK PULAU PINANG",
        "IPGMK TUANKU BAINUN","IPGMK TENGKU AMPUAN AFZAN","IPGMK DATO' RAZALI ISMAIL","IPGMK SULTAN MIZAN",
        "IPGMK KOTA BHARU","IPGMK RAJANG","IPGMK KENT","IPGMK BATU LINTANG","IPGMK TAWAU",
        "IPGMK KENINGAU","IPGMK TUN ABDUL RAZAK","IPGMK SULTAN ABDUL HALIM","IPGMK GAYA","IPGMK SARAWAK"], required:true }
];

const DASS_ITEMS = [
    "Saya berasa sukar untuk bersemangat melakukan sesuatu perkara.",
    "Saya mendapati diri saya mudah terganggu dengan tindak-tanduk orang lain.",
    "Saya rasa mulut saya kering.",
    "Saya tidak dapat mengalami perasaan positif sama sekali.",
    "Saya mendapati diri saya sukar untuk berehat.",
    "Saya rasa cepat hilang tenaga dan menjadi lemah.",
    "Saya mendapati diri saya sukar untuk memulakan sesuatu kerja.",
    "Saya rasa terdapat ketegangan otot di seluruh badan saya.",
    "Saya berasa bimbang akan sesuatu perkara yang mungkin berlaku.",
    "Saya rasa tertekan (depressed).",
    "Saya rasa banyak perkara yang mengecewakan saya.",
    "Saya rasa tidak ada apa-apa yang saya boleh nikmati.",
    "Saya berasa resah dan gelisah.",
    "Saya rasa diri saya tidak berharga.",
    "Saya rasa diri saya tidak sabar.",
    "Saya rasa diri saya amat lemah.",
    "Saya rasa sukar untuk membuat keputusan.",
    "Saya rasa sesuatu yang mengerikan akan berlaku.",
    "Saya rasa diri saya tidak berguna.",
    "Saya rasa tidak boleh bertoleransi dengan apa-apa halangan terhadap perkara yang saya mahu lakukan.",
    "Saya rasa sangat takut tanpa sebab yang munasabah."
];

const DASS_KEYS = {
    stress: [0, 5, 7, 10, 11, 13, 17],
    anxiety: [1, 3, 6, 8, 14, 18, 19],
    depression: [2, 4, 9, 12, 15, 16, 20]
};

const DASS_LEVELS = {
    depression: { normal: 9, ringan: 13, sederhana: 20, teruk: 27 },
    anxiety: { normal: 7, ringan: 9, sederhana: 14, teruk: 19 },
    stress: { normal: 14, ringan: 18, sederhana: 25, teruk: 33 }
};

const ITEMS_PER_PAGE = 7;

// ===================== LOGIK OPERASI APLIKASI =====================
const GOOGLE_SHEETS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyTZBHPaMa1AMFbfzCXjUh_ZnCEzgD-3vxBce9pJqK2GpUpvwNmV4_BVZv2pXsQQZ9zxA/exec';

const app = {
    phase: 'welcome',
    section: 0,
    answers: { A:{}, B:{} },
    STORAGE_KEY: 'dass21_responses_v1',

    init() { this.renderWelcome(); },

    renderWelcome() {
        this.hideNav(); this.hideProgress();
        document.getElementById('main-content').innerHTML = `
            <div class="fade-in bg-white rounded-2xl shadow-sm border border-slate-200 p-8 text-center max-w-3xl mx-auto">
                <div class="w-20 h-20 bg-rose-50 rounded-2xl flex items-center justify-center mx-auto mb-5">
                    <svg class="w-10 h-10 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Selamat Datang ke Ujian DASS-21</h2>
                <p class="text-slate-500 mb-6">Depression, Anxiety, and Stress Scale - 21 Item</p>
                <div class="bg-slate-50 rounded-xl p-5 text-left mb-4 text-sm">
                    <p class="font-semibold text-slate-700 mb-2">Arahan:</p>
                    <p class="text-slate-600 mb-3">Sila pilih jawapan yang paling menggambarkan perasaan anda sepanjang minggu lepas. Tiada jawapan betul atau salah.</p>
                    <div class="flex flex-wrap gap-2 text-xs">
                        <span class="px-2 py-1 bg-slate-100 rounded border border-slate-200">0 = Tidak sesuai langsung</span>
                        <span class="px-2 py-1 bg-slate-100 rounded border border-slate-200">1 = Sesuai sedikit</span>
                        <span class="px-2 py-1 bg-slate-100 rounded border border-slate-200">2 = Sesuai banyak</span>
                        <span class="px-2 py-1 bg-slate-100 rounded border border-slate-200">3 = Sangat sesuai</span>
                    </div>
                </div>
                <button onclick="app.startRegister()" class="px-8 py-3 bg-rose-600 text-white rounded-xl font-semibold text-base hover:bg-rose-700 transition">
                    Mula Ujian
                </button>
            </div>`;
    },

    startRegister() {
        this.phase = 'register';
        this.showNav(); this.showProgress();
        this.renderRegister();
        this.updateProgress();
    },

    renderRegister() {
        let html = `<div class="fade-in space-y-5">
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-lg font-bold text-slate-800 mb-1">Bahagian A: Maklumat Pengguna</h2>
                <p class="text-slate-500 text-sm mb-6">Sila lengkapkan maklumat di bawah.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">`;

        DEMO_QUESTIONS.forEach(q => {
            const full = q.type === 'radio' || (q.type === 'select' && q.options.length > 5);
            html += `<div class="${full ? 'md:col-span-2' : ''}">`;
            html += `<label class="block text-sm font-semibold text-slate-700 mb-1.5">${q.label}${q.required ? '<span class="text-red-500 ml-0.5">*</span>' : ''}</label>`;
            if (q.type === 'text' || q.type === 'email') {
                html += `<input type="${q.type}" id="a_${q.id}" value="${this.answers.A[q.id] || ''}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none transition text-sm" placeholder="${q.placeholder || ''}">`;
            } else if (q.type === 'select') {
                html += `<select id="a_${q.id}" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-rose-500 outline-none text-sm"><option value="">-- Sila Pilih --</option>${q.options.map(o => `<option value="${o}" ${this.answers.A[q.id] === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
            } else if (q.type === 'radio') {
                const cols = q.options.length <= 2 ? 'grid-cols-2' : 'grid-cols-2 sm:grid-cols-4';
                html += `<div class="grid ${cols} gap-2">`;
                q.options.forEach(opt => {
                    const checked = this.answers.A[q.id] === opt ? 'checked' : '';
                    html += `<label class="flex items-center gap-2.5 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-rose-50 hover:border-rose-300 transition bg-white"><input type="radio" name="a_${q.id}" value="${opt}" ${checked} class="w-4 h-4 text-rose-600"><span class="text-sm text-slate-700">${opt}</span></label>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
        });
        html += `</div></section></div>`;
        document.getElementById('main-content').innerHTML = html;
    },

    renderInventoryPage() {
        const startIdx = this.section * ITEMS_PER_PAGE;
        const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, DASS_ITEMS.length);
        let html = `<div class="fade-in">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-4 sticky top-2 z-10">
                <h2 class="text-xl font-bold text-slate-800">SOAL SELIDIK DASS-21</h2>
                <p class="text-sm text-slate-500">Item ${startIdx + 1} hingga ${endIdx} daripada ${DASS_ITEMS.length}</p>
            </div>
            <div class="space-y-2">`;

        for (let i = startIdx; i < endIdx; i++) {
            const saved = this.answers.B[i];
            html += `<div class="question-row bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex items-start gap-4 hover-lift">
                <span class="text-sm font-bold text-rose-600 w-7 shrink-0 mt-0.5">${i+1}.</span>
                <span class="text-sm text-slate-700 flex-1 leading-relaxed">${DASS_ITEMS[i]}</span>
                <div class="flex gap-1.5 shrink-0">`;
            for (let v = 0; v <= 3; v++) {
                const checked = saved == v ? 'checked' : '';
                html += `<label class="cursor-pointer">
                    <input type="radio" name="b_${i}" value="${v}" ${checked} class="radio-circle sr-only" onchange="app.saveB(${i},${v})">
                    <div class="w-9 h-9 rounded-full border-2 border-slate-300 flex items-center justify-center text-xs font-semibold text-slate-500 hover:border-rose-400 transition-all">${v}</div>
                </label>`;
            }
            html += `</div></div>`;
        }
        html += `</div></div>`;
        document.getElementById('main-content').innerHTML = html;
    },

    renderResults() {
        const scores = this.calcDass();
        const levels = this.getLevels(scores);
        const a = this.answers.A;

        let html = `<div id="result-slip" class="fade-in space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 text-center">
                <h2 class="text-xl font-bold text-slate-800">Slip Keputusan DASS-21</h2>
                <p class="text-slate-400 text-xs mt-0.5">Dijana pada ${new Date().toLocaleString('ms-MY')}</p>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-md font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Keputusan Skor</h3>
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-semibold text-slate-700">Kemurungan (Depression)</span>
                            <span class="text-sm font-bold px-3 py-1 rounded-full text-white ${levels.D.color}">${levels.D.label}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 mb-1.5">
                            <div class="${levels.D.color} h-3 rounded-full transition-all" style="width:${Math.min((scores.D/42)*100, 100)}%"></div>
                        </div>
                        <div class="flex justify-between text-xs text-slate-400"><span>Skor: ${scores.D} / 42</span><span></span></div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-semibold text-slate-700">Kebimbangan (Anxiety)</span>
                            <span class="text-sm font-bold px-3 py-1 rounded-full text-white ${levels.A.color}">${levels.A.label}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 mb-1.5">
                            <div class="${levels.A.color} h-3 rounded-full transition-all" style="width:${Math.min((scores.A/42)*100, 100)}%"></div>
                        </div>
                        <div class="flex justify-between text-xs text-slate-400"><span>Skor: ${scores.A} / 42</span><span></span></div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-semibold text-slate-700">Tekanan (Stress)</span>
                            <span class="text-sm font-bold px-3 py-1 rounded-full text-white ${levels.S.color}">${levels.S.label}</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3 mb-1.5">
                            <div class="${levels.S.color} h-3 rounded-full transition-all" style="width:${Math.min((scores.S/42)*100, 100)}%"></div>
                        </div>
                        <div class="flex justify-between text-xs text-slate-400"><span>Skor: ${scores.S} / 42</span><span></span></div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-md font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3">Maklumat Diri</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 text-sm">
                    <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Nama</span><span class="font-medium text-slate-700">${a.nama || '-'}</span></div>
                    <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">No. KP</span><span class="font-medium text-slate-700">${a.kad_pengenalan || '-'}</span></div>
                    <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">No. Matrik/Staf</span><span class="font-medium text-slate-700">${a.no_matrik || '-'}</span></div>
                    <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Emel</span><span class="font-medium text-slate-700">${a.emel || '-'}</span></div>
                    <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Jantina</span><span class="font-medium text-slate-700">${a.jantina || '-'}</span></div>
                    <div class="flex justify-between py-1.5 border-b border-slate-100"><span class="text-slate-500">Kategori</span><span class="font-medium text-slate-700">${a.kategori || '-'}</span></div>
                    <div class="flex justify-between py-1.5 border-b border-slate-100 md:col-span-2"><span class="text-slate-500">IPG Kampus</span><span class="font-medium text-slate-700 text-right">${a.ipg || '-'}</span></div>
                </div>
            </div>

            <div class="no-print flex flex-wrap justify-center gap-4 bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                <button onclick="app.downloadPDF()" class="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg text-sm shadow flex items-center gap-2 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    Muat Turun PDF
                </button>
                <button onclick="app.resetInventory()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-lg text-sm flex items-center gap-2 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5M4 4h5v.582"/></svg>
                    Jawab Semula
                </button>
            </div>
        </div>`;

        document.getElementById('main-content').innerHTML = html;
        this.hideNav(); this.hideProgress();
    },

    calcDass() {
        const scores = { D: 0, A: 0, S: 0 };
        DASS_KEYS.depression.forEach(idx => { scores.D += this.answers.B[idx] || 0; });
        DASS_KEYS.anxiety.forEach(idx => { scores.A += this.answers.B[idx] || 0; });
        DASS_KEYS.stress.forEach(idx => { scores.S += this.answers.B[idx] || 0; });
        scores.D *= 2; scores.A *= 2; scores.S *= 2;
        return scores;
    },

    getLevels(scores) {
        const getLevel = (type, score) => {
            const l = DASS_LEVELS[type];
            if (score <= l.normal) return { label: "Normal", color: "bg-green-500" };
            if (score <= l.ringan) return { label: "Ringan", color: "bg-yellow-400" };
            if (score <= l.sederhana) return { label: "Sederhana", color: "bg-orange-500" };
            if (score <= l.teruk) return { label: "Teruk", color: "bg-red-500" };
            return { label: "Sangat Teruk", color: "bg-red-800" };
        };
        return {
            D: getLevel('depression', scores.D),
            A: getLevel('anxiety', scores.A),
            S: getLevel('stress', scores.S)
        };
    },

    notify(type, title, message) { 
        const c = document.getElementById('toast-container'); if (!c) return;
        const t = document.createElement('div'); const s = type === 'success';
        t.className = `app-toast ${s ? 'success' : 'error'}`;
        t.innerHTML = `<svg class="toast-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${s ? 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z'}"/></svg><div><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`;
        c.appendChild(t); setTimeout(() => { t.classList.add('toast-out'); setTimeout(() => t.remove(), 240); }, 4200);
    },

    async next() {
        if (this.phase === 'register') {
            if (!this.validateRegister()) return;
            this.saveRegister();
            this.phase = 'inventory'; this.section = 0;
            this.renderInventoryPage(); this.updateProgress();
            return;
        }
        if (this.phase === 'inventory') {
            if (!this.validateInventory()) return;
            const totalPages = Math.ceil(DASS_ITEMS.length / ITEMS_PER_PAGE);
            if (this.section < totalPages - 1) {
                this.section++; this.renderInventoryPage(); this.updateProgress();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                // Hantar ke Google Sheets Sebelum Paparkan Keputusan
                await this.submitToSheet();
                this.phase = 'results';
                this.renderResults();
                this.openModal('modal-complete');
            }
        }
    },

    prev() {
        if (this.phase === 'inventory' && this.section > 0) {
            this.section--; this.renderInventoryPage(); this.updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (this.phase === 'inventory' && this.section === 0) {
            this.phase = 'register'; this.renderRegister(); this.updateProgress();
        }
    },

    validateRegister() {
        for (const q of DEMO_QUESTIONS) {
            if (!q.required) continue;
            let val = q.type === 'radio' ? document.querySelector(`input[name="a_${q.id}"]:checked`)?.value : document.getElementById(`a_${q.id}`)?.value;
            if (!val || !val.trim()) { this.notify('error', 'Maklumat belum lengkap', `Sila lengkapkan: ${q.label}`); return false; }
        }
        return true;
    },

    validateInventory() {
        const startIdx = this.section * ITEMS_PER_PAGE;
        const endIdx = Math.min(startIdx + ITEMS_PER_PAGE, DASS_ITEMS.length);
        for (let i = startIdx; i < endIdx; i++) {
            if (!document.querySelector(`input[name="b_${i}"]:checked`)) {
                this.notify('error', 'Soalan belum dijawab', `Sila jawab item ${i+1} sebelum ke muka seterusnya.`);
                return false;
            }
        }
        return true;
    },

    saveRegister() {
        DEMO_QUESTIONS.forEach(q => {
            if (q.type === 'radio') {
                const el = document.querySelector(`input[name="a_${q.id}"]:checked`);
                if (el) this.answers.A[q.id] = el.value;
            } else {
                const el = document.getElementById(`a_${q.id}`);
                if (el) this.answers.A[q.id] = el.value;
            }
        });
    },

    saveB(idx, val) { this.answers.B[idx] = parseInt(val); },
    resetInventory() { this.phase = 'welcome'; this.section = 0; this.answers = { A:{}, B:{} }; this.renderWelcome(); },
    
    // FUNGI HANTAR KE GOOGLE SHEET (DENGAN 21 SKOR ITEM)
    async submitToSheet() {
        const scores = this.calcDass();
        const levels = this.getLevels(scores);
        
        // Kumpul jawapan setiap item (1 hingga 21)
        const itemScores = [];
        for (let i = 0; i < 21; i++) {
            itemScores.push(this.answers.B[i] !== undefined ? this.answers.B[i] : 0);
        }

        const payload = {
            student: { ...this.answers.A },
            items: itemScores, // Hantar 21 skor item
            scores: scores,
            levels: { D: levels.D.label, A: levels.A.label, S: levels.S.label }
        };

        try {
            await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            this.notify('success', 'Berjaya Dihantar', 'Maklumat dan 21 skor item anda telah direkodkan.');
        } catch (error) {
            this.notify('error', 'Gagal Dihantar', 'Sila semak sambungan internet anda.');
        }
    },

    showNav() { document.getElementById('nav-container').classList.remove('hidden'); },
    hideNav() { document.getElementById('nav-container').classList.add('hidden'); },
    showProgress() { document.getElementById('progress-bar-container').classList.remove('hidden'); },
    hideProgress() { document.getElementById('progress-bar-container').classList.add('hidden'); },

    updateProgress() {
        const totalPages = Math.ceil(DASS_ITEMS.length / ITEMS_PER_PAGE);
        let pct, label;
        if (this.phase === 'register') { pct = 5; label = 'Pendaftaran Maklumat'; }
        else { pct = Math.round(((this.section + 1) / totalPages) * 95) + 5; label = `DASS-21 — Muka ${this.section + 1} / ${totalPages}`; }
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-percent').textContent = pct + '%';
        document.getElementById('progress-text').textContent = label;
        document.getElementById('btn-back').classList.toggle('hidden', this.phase === 'register');
        const isLast = this.phase === 'inventory' && this.section === totalPages - 1;
        document.getElementById('btn-forward').innerHTML = isLast ? `<span class="flex items-center gap-2">Lihat Keputusan<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg></span>` : `<span class="flex items-center gap-2">Seterusnya<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></span>`;
    },

    openModal(id) { document.getElementById(id).classList.add('active'); },
    closeModal(id) { document.getElementById(id).classList.remove('active'); },

    // FUNGSI PDF YANG TELAH DIBAIKPULIH
    async downloadPDF() {
        try {
            const element = document.getElementById('result-slip');
            if (!element) {
                this.notify('error', 'Ralat', 'Slip keputusan tidak dijumpai.');
                return;
            }
            
            if (typeof html2pdf === 'undefined') {
                this.notify('error', 'Pustaka PDF Gagal Dimuatkan', 'Sila pastikan anda mempunyai sambungan internet yang stabil dan cuba semula.');
                return;
            }

            const name = (this.answers.A.nama || 'PELAJAR').replace(/[^a-zA-Z0-9_-]+/g, '_');
            this.notify('info', 'Sila Tunggu', 'PDF sedang dijana, jangan tutup tetingkap ini...');

            await html2pdf().set({
                margin: [10, 10, 10, 10],
                filename: `SLIP_DASS21_${name}.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollY: 0 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            }).from(element).save();
            
        } catch (error) {
            console.error("PDF Error:", error);
            this.notify('error', 'Gagal Jana PDF', 'Berlaku ralat. Sila pastikan anda menggunakan pelayar Chrome/Firefox terkini.');
        }
    }
};

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
