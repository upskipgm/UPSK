<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intervensi Minda Sejahtera</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- IKON RINGKAS ---
    const Icon = ({ children, className = "", size = 20 }) => (
      <span
        className={className}
        style={{
          fontSize: size + "px",
          lineHeight: 1,
          display: "inline-flex",
          alignItems: "center",
          justifyContent: "center"
        }}
      >
        {children}
      </span>
    );

    // --- DATA PEMBANTU ---
    const MOCK_STUDENTS = {
      "BU12345": { name: "Ahmad Zaki Bin Rosli", class: "Unit PISMP 4.01" },
      "DEMO99": { name: "Pelajar Percubaan (Demo)", class: "Unit PISMP 4.02" }
    };

    const activityData = {
      1: { id: 1, title: "Pernafasan Perut (Belly Breathing)", type: "Relaksasi", interactive: "belly-breathing", duration: 300 },
      3: { id: 2, title: "Pembaris Motivasi", type: "Motivasi", interactive: "motivation-ruler" },
      5: { id: 3, title: "Latihan Kesyukuran", type: "Positiviti", interactive: "gratitude-exercises" },
      7: { id: 4, title: "Teknik Kesedaran RAIN", type: "Mindfulness", interactive: "rain-technique" },
      9: { id: 5, title: "Kad Psikologi Positif", type: "Kognitif", interactive: "psychology-cards" },
      11: { id: 6, title: "Pelan Pencegahan Relaps", type: "Strategi", interactive: "prevention-plan" },
      13: { id: 7, title: "Surat Kesyukuran", type: "Refleksi", interactive: "gratitude-letter", minWords: 15 }
    };

    const questionnaireItems = [
      "Saya sentiasa teringat kejadian itu.",
      "Saya sering termenung atau kelihatan 'hilang dalam fikiran'.",
      "Tidak boleh tidur.",
      "Mengalami mimpi buruk.",
      "Menunjukkan tindak balas emosi melampau (menangis, panik, menjerit) tanpa sebab jelas.",
      "Mengelak bercakap tentang insiden atau tempat berkaitan.",
      "Enggan ke kuliah/kawasan kampus.",
      "Hilang minat terhadap aktiviti yang dahulu diminati.",
      "Menyendiri, kurang bergaul dengan rakan atau keluarga.",
      "Nampak murung, tidak bermotivasi.",
      "Menyalahkan diri sendiri atau orang lain atas kejadian.",
      "Mudah terkejut (startle response).",
      "Sukar tidur / sering letih di IPG.",
      "Cepat marah, mudah naik angin."
    ];

    // --- KOMPONEN KECIL ---
    const Nav = ({ setView, setUser }) => (
      <div className="flex items-center justify-between mb-8 px-2 border-b border-slate-100 pb-4">
        <div className="flex items-center gap-2 text-indigo-700">
          <Icon size={18}>🛡️</Icon>
          <span className="text-[9px] font-bold tracking-[0.2em] uppercase text-slate-500">Akses Sulit IPGKPM</span>
        </div>
        <button
          onClick={() => { setView('landing'); setUser(null); }}
          className="text-slate-400 hover:text-red-500 transition-all flex items-center gap-1 text-[10px] font-bold uppercase tracking-widest"
        >
          Keluar <Icon size={14}>🚪</Icon>
        </button>
      </div>
    );

    const LandingView = ({ setView }) => (
      <div className="min-h-screen bg-white flex flex-col items-center justify-center p-8">
        <div className="w-full max-w-sm space-y-12">
          <div className="text-center space-y-4">
            <div className="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl shadow-indigo-100 transform rotate-3">
              <Icon size={36} className="text-white">💙</Icon>
            </div>
            <div className="space-y-2">
              <h1 className="text-3xl font-black text-slate-900 tracking-tight leading-none">
                Intervensi<br /><span className="text-indigo-600">Minda Sejahtera</span>
              </h1>
              <p className="text-[11px] text-slate-400 uppercase tracking-[0.3em] font-bold">
                Institut Pendidikan Guru (IPGKPM)
              </p>
            </div>
          </div>

          <div className="grid gap-3">
            <button
              onClick={() => setView('login-s')}
              className="w-full p-6 bg-slate-50 border border-slate-100 rounded-[1.5rem] flex items-center gap-5 hover:bg-indigo-50 hover:border-indigo-100 transition-all group"
            >
              <div className="bg-white p-3 rounded-xl shadow-sm text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                <Icon size={22}>👤</Icon>
              </div>
              <div className="text-left">
                <p className="font-black text-slate-800 text-sm tracking-tight">AKSES PELAJAR</p>
                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Mod Intervensi Berfasa</p>
              </div>
            </button>

            <button
              onClick={() => setView('login-c')}
              className="w-full p-6 bg-white border border-slate-100 rounded-[1.5rem] flex items-center gap-5 hover:bg-slate-50 transition-all group shadow-sm"
            >
              <div className="bg-slate-100 p-3 rounded-xl text-slate-600 group-hover:bg-slate-800 group-hover:text-white transition-all">
                <Icon size={22}>🔒</Icon>
              </div>
              <div className="text-left">
                <p className="font-black text-slate-800 text-sm tracking-tight">AKSES KAUNSELOR</p>
                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Panel Pemantauan Data</p>
              </div>
            </button>
          </div>

          <div className="pt-4 text-center">
            <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Unit Psikologi & Kaunseling</p>
          </div>
        </div>
      </div>
    );

    const LoginView = ({ type, setView, inputs, setInputs, handleLogin, msg }) => (
      <div className="min-h-screen bg-white p-10 flex flex-col justify-center">
        <div className="max-w-sm mx-auto w-full space-y-8">
          <button
            onClick={() => setView('landing')}
            className="text-slate-400 font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-2 hover:text-indigo-600 transition-colors"
          >
            <Icon size={16}>⬅️</Icon> KEMBALI
          </button>

          <div className="space-y-2">
            <h2 className="text-3xl font-black text-slate-900 tracking-tight">{type === 's' ? 'Log Masuk' : 'Akses'}</h2>
            <p className="text-slate-400 text-xs font-bold uppercase tracking-wider">
              {type === 's' ? 'Sila masukkan angka giliran anda' : 'Pihak Berkuasa Unit Psikologi'}
            </p>
          </div>

          <div className="space-y-4">
            <div className="space-y-1">
              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Identiti</label>
              <input
                className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-lg focus:ring-4 focus:ring-indigo-50 focus:border-indigo-200 transition-all text-slate-800"
                placeholder={type === 's' ? "Angka Giliran" : "ID Kaunselor"}
                value={inputs.id}
                onChange={e => setInputs({ ...inputs, id: e.target.value.toUpperCase() })}
              />
            </div>

            {type === 'c' && (
              <div className="space-y-1">
                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Kata Laluan</label>
                <input
                  className="w-full p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold focus:ring-4 focus:ring-indigo-50 focus:border-indigo-200 transition-all text-slate-800"
                  type="password"
                  placeholder="••••••••"
                  value={inputs.pass}
                  onChange={e => setInputs({ ...inputs, pass: e.target.value })}
                />
              </div>
            )}

            {msg && (
              <div className="flex items-center gap-2 text-red-500 bg-red-50 p-3 rounded-xl border border-red-100">
                <Icon size={14}>⚠️</Icon>
                <p className="text-[10px] font-black uppercase tracking-tight">{msg}</p>
              </div>
            )}
          </div>

          <button
            onClick={() => handleLogin(type === 's' ? 'student' : 'counselor')}
            className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 uppercase tracking-[0.2em] active:scale-[0.98] transition-all"
          >
            SAHKAN IDENTITI
          </button>
        </div>
      </div>
    );

    const ScoreResultView = ({ status, setView, setResponses }) => {
      const isPost = status.post;
      const score = isPost ? status.postScore : status.preScore;
      const level = isPost ? status.postLevel : status.preLevel;

      const getLevelColor = (l) => {
        if (l === "Tinggi") return "text-red-600 bg-red-50 border-red-200";
        if (l === "Sederhana") return "text-amber-600 bg-amber-50 border-amber-200";
        return "text-indigo-600 bg-indigo-50 border-indigo-200";
      };

      return (
        <div className="min-h-screen bg-white flex flex-col items-center justify-center p-8">
          <div className="w-full space-y-10 text-center">
            <div className="w-24 h-24 bg-slate-50 rounded-[2.5rem] flex items-center justify-center mx-auto text-indigo-600 border border-slate-100 shadow-sm">
              <Icon size={48}>📊</Icon>
            </div>

            <div className="space-y-2">
              <h2 className="text-3xl font-black uppercase tracking-tight text-slate-900">Penilaian Selesai</h2>
              <p className="text-slate-400 text-xs font-bold uppercase tracking-[0.2em]">
                {isPost ? "Fasa Pos-Intervensi IPGKPM" : "Fasa Pra-Intervensi IPGKPM"}
              </p>
            </div>

            <div className="py-6 space-y-1 border-y border-slate-50">
              <p className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em] mb-2">Analisis Skor</p>
              <div className="text-7xl font-black text-slate-900 tabular-nums leading-none">
                {score}<span className="text-2xl text-slate-300 font-bold">/14</span>
              </div>
            </div>

            <div className={`py-4 px-8 rounded-2xl border-2 font-black uppercase tracking-[0.2em] text-xs mx-4 ${getLevelColor(level)} shadow-sm`}>
              TAHAP: {level}
            </div>

            <div className="p-6 bg-slate-50 rounded-[2rem] text-center mx-2 border border-slate-100">
              <p className="text-[11px] font-bold text-slate-500 leading-relaxed uppercase tracking-tight">
                {level === "Tinggi" && "Skor tinggi dikesan. Mentor atau Unit Psikologi akan menghubungi anda untuk sokongan emosi lanjut."}
                {level === "Sederhana" && "Beberapa petanda tekanan dikesan. Anda digalakkan untuk melengkapkan 14 hari intervensi minda ini."}
                {level === "Rendah" && "Kesejahteraan emosi anda di tahap stabil. Teruskan latihan kesedaran diri sebagai langkah pencegahan."}
              </p>
            </div>

            <button
              onClick={() => { setResponses({}); setView('dash'); window.scrollTo(0, 0); }}
              className="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black shadow-2xl shadow-slate-200 uppercase tracking-[0.2em] hover:bg-slate-800 transition-all"
            >
              MENU UTAMA
            </button>
          </div>
        </div>
      );
    };

    const StudentDashboard = ({ user, day, setDay, status, setView, currentActivity, isCompleted, setUser }) => (
      <div className="min-h-screen bg-white p-6 max-w-md mx-auto flex flex-col">
        <Nav setView={setView} setUser={setUser} />

        <div className="mb-8 p-4 bg-indigo-50 border border-indigo-100 rounded-3xl flex items-center justify-between shadow-sm">
          <div className="text-[10px] font-black text-indigo-700 uppercase tracking-widest flex items-center gap-2">
            <Icon size={14}>📅</Icon> Simulasi Fasa
          </div>
          <div className="flex gap-1 items-center bg-white p-1 rounded-xl border border-indigo-200 shadow-inner">
            <button onClick={() => setDay(d => Math.max(1, d - 1))} className="w-8 h-8 flex items-center justify-center rounded-lg text-indigo-600 hover:bg-indigo-50 font-black">-</button>
            <span className="font-black text-sm text-indigo-900 w-10 text-center">{day}</span>
            <button onClick={() => setDay(d => Math.min(14, d + 1))} className="w-8 h-8 flex items-center justify-center rounded-lg text-indigo-600 hover:bg-indigo-50 font-black">+</button>
          </div>
        </div>

        <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl mb-10 relative overflow-hidden text-center">
          <div className="relative z-10 text-center space-y-6">
            <div className="space-y-2">
              <p className="text-[10px] font-bold opacity-40 uppercase tracking-[0.4em] text-center">Profil Pelatih</p>
              <h2 className="text-2xl font-black tracking-tight text-center leading-tight uppercase">{user?.name}</h2>
              <p className="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">{user?.class}</p>
            </div>

            <div className="space-y-3">
              <div className="flex justify-between items-center px-1">
                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-300">Kemajuan</span>
                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-300">{Math.round((day / 14) * 100)}%</span>
              </div>
              <div className="bg-white/10 rounded-full h-2 w-full overflow-hidden shadow-inner">
                <div className="bg-indigo-500 h-full transition-all duration-1000 rounded-full" style={{ width: `${(day / 14) * 100}%` }} />
              </div>
              <p className="text-[10px] font-black tracking-widest text-center uppercase opacity-50">HARI {day} DARIPADA 14</p>
            </div>
          </div>
          <div className="absolute -right-10 -bottom-10 text-[100px] opacity-5">🧠</div>
        </div>

        {!status.pre ? (
          <div className="bg-indigo-50 p-8 rounded-[2.5rem] border border-indigo-100 space-y-6 text-center">
            <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto text-indigo-600 shadow-sm border border-indigo-100">
              <Icon size={28}>📝</Icon>
            </div>
            <div className="space-y-2">
              <h3 className="font-black text-slate-800 uppercase tracking-tight text-sm text-center">Ujian Pra-Fasa</h3>
              <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tight text-center leading-relaxed">
                Penilaian awal keadaan emosi sebelum intervensi dimulakan.
              </p>
            </div>
            <button onClick={() => setView('survey')} className="w-full py-4 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-indigo-100 hover:translate-y-[-2px] transition-all">
              Mula Penilaian
            </button>
          </div>
        ) : (
          <div className="space-y-8 flex-1">
            <div className="flex items-center justify-between px-2">
              <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Aktiviti Semasa</h4>
              <div className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                <Icon size={12}>📊</Icon>
                <span className="text-[9px] font-black text-slate-500 uppercase">Skor: {status.preScore}/14</span>
              </div>
            </div>

            {currentActivity ? (
              <button
                onClick={() => !isCompleted && setView('activity')}
                className={`w-full p-8 rounded-[2.5rem] border-2 transition-all flex flex-col items-center gap-4 text-center ${isCompleted ? 'bg-slate-50 border-slate-100 opacity-60' : 'bg-white border-slate-100 shadow-xl shadow-slate-100/50 hover:border-indigo-200 active:scale-95 group'}`}
              >
                <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-2 shadow-sm border transition-all ${isCompleted ? 'bg-green-50 text-green-600 border-green-100' : 'bg-indigo-50 text-indigo-600 border-indigo-100 group-hover:bg-indigo-600 group-hover:text-white'}`}>
                  <Icon size={28}>{isCompleted ? '✅' : '📌'}</Icon>
                </div>
                <div className="space-y-1">
                  <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">{currentActivity.type}</p>
                  <h3 className="font-black text-slate-800 uppercase tracking-tight text-base leading-tight">{currentActivity.title}</h3>
                </div>
                <p className={`text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-xl mt-2 border ${isCompleted ? 'bg-green-100 text-green-700 border-green-200' : 'bg-indigo-100 text-indigo-700 border-indigo-200'}`}>
                  {isCompleted ? "Selesai Dilaksanakan" : "Sila Jalankan Aktiviti"}
                </p>
              </button>
            ) : (
              <div className="p-16 text-center bg-slate-50 rounded-[2.5rem] border border-dashed border-slate-200">
                <p className="text-[10px] text-slate-300 font-black italic uppercase tracking-[0.3em]">Tiada aktiviti dijadualkan hari ini</p>
              </div>
            )}

            {day === 14 && status.completedDays.length >= 7 && !status.post && (
              <button onClick={() => setView('survey')} className="w-full py-5 bg-green-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-[0.3em] shadow-2xl shadow-green-100">
                Lengkapkan Pos-Penilaian
              </button>
            )}
          </div>
        )}

        <div className="mt-12 text-center pb-4">
          <p className="text-[9px] text-slate-300 font-bold uppercase tracking-[0.5em] text-center">Intervensi Minda Sejahtera</p>
        </div>
      </div>
    );

    const InteractiveActivity = ({ currentActivity, setView, completeActivity }) => {
      const [breathingStep, setBreathingStep] = useState(0);
      const [isBreathingActive, setIsBreathingActive] = useState(false);
      const [breathingTimeLeft, setBreathingTimeLeft] = useState(currentActivity.duration || 0);
      const [showTutorial, setShowTutorial] = useState(currentActivity.interactive === 'belly-breathing');

      const [motivationLevel, setMotivationLevel] = useState(5);
      const [motivationText, setMotivationText] = useState("");
      const [gratitudeEntries, setGratitudeEntries] = useState(["", "", ""]);
      const [rainStep, setRainStep] = useState(0);
      const [selectedPrompt, setSelectedPrompt] = useState(null);
      const [promptResponse, setPromptResponse] = useState("");
      const [plan, setPlan] = useState({ coping: ["", ""], support: ["", ""], outcomes: ["", ""] });
      const [letterText, setLetterText] = useState("");

      const prompts = [
        "Bagaimana rakan sejawat menunjukkan mereka peduli tentang anda minggu ini?",
        "Kongsi cerita menarik yang berlaku di kampus minggu ini.",
        "Jelaskan sesuatu yang menyeronokkan anda buat hari ini semasa kuliah/praktikum.",
        "Apakah perkara baik yang anda katakan kepada pelajar/rakan minggu ini?",
        "Jelaskan sesuatu yang membuat anda ketawa minggu ini.",
        "Sesuatu yang anda syukuri sebagai pendidik pelatih hari ini.",
        "Cabaran akademik/praktikum yang anda berjaya atasi minggu ini.",
        "Kekuatan peribadi yang anda gunakan dalam tugasan hari ini."
      ];

      const rainGuidance = [
        { title: "Recognize (Kenal Pasti)", desc: "Kenali fikiran, perasaan, dan sensasi fizikal anda sekarang. Namakan perasaan itu secara jujur." },
        { title: "Allow (Izinkan)", desc: "Izinkan pengalaman itu hadir tanpa halangan. Katakan pada diri: 'Inilah keadaan saya buat masa sekarang'." },
        { title: "Investigate (Siasat)", desc: "Perhatikan di mana perasaan ini terasa dalam badan anda. Apakah yang paling anda perlukan saat ini?" },
        { title: "Nurture (Pupuk)", desc: "Hantarkan rasa belas kasihan pada diri sendiri. Anda melakukan yang terbaik dengan apa yang ada." }
      ];

      useEffect(() => {
        let timer;
        if (currentActivity.interactive === 'belly-breathing' && isBreathingActive && breathingTimeLeft > 0) {
          timer = setInterval(() => {
            setBreathingTimeLeft(prev => prev - 1);
            const totalDuration = currentActivity.duration || 300;
            const cycleSeconds = (totalDuration - breathingTimeLeft + 1) % 10;
            if (cycleSeconds <= 4 && cycleSeconds > 0) setBreathingStep(0);
            else if (cycleSeconds > 4 && cycleSeconds <= 6) setBreathingStep(1);
            else setBreathingStep(2);
          }, 1000);
        } else if (breathingTimeLeft === 0 && isBreathingActive) {
          setBreathingStep(3);
          setIsBreathingActive(false);
        }
        return () => clearInterval(timer);
      }, [isBreathingActive, breathingTimeLeft, currentActivity]);

      const canComplete = () => {
        if (currentActivity.interactive === 'belly-breathing') return breathingTimeLeft === 0 && isBreathingActive === false && !showTutorial;
        if (currentActivity.interactive === 'motivation-ruler') return motivationText.length > 5;
        if (currentActivity.interactive === 'gratitude-exercises') return gratitudeEntries.every(e => e.length > 2);
        if (currentActivity.interactive === 'rain-technique') return rainStep >= 3;
        if (currentActivity.interactive === 'psychology-cards') return promptResponse.length > 5;
        if (currentActivity.interactive === 'prevention-plan') return plan.coping[0].length > 0 && plan.support[0].length > 0;
        if (currentActivity.interactive === 'gratitude-letter') return letterText.split(' ').filter(w => w.length > 0).length >= (currentActivity.minWords || 10);
        return true;
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      };

      return (
        <div className="min-h-screen bg-white p-8 max-w-md mx-auto flex flex-col text-center">
          <div className="flex justify-between items-center mb-10 border-b border-slate-50 pb-6">
            <button onClick={() => setView('dash')} className="text-slate-400 font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-2 hover:text-indigo-600 transition-colors">
              <Icon size={16}>⬅️</Icon> KEMBALI
            </button>
            <span className="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full uppercase tracking-widest">{currentActivity.type}</span>
          </div>

          <div className="flex-1 space-y-10 overflow-y-auto text-center scrollbar-hide pb-10">
            <div className="text-center space-y-3">
              <h2 className="text-2xl font-black text-slate-900 uppercase tracking-tight leading-tight text-center">{currentActivity.title}</h2>
              <div className="w-12 h-1 bg-indigo-100 mx-auto rounded-full"></div>
            </div>

            {currentActivity.interactive === 'belly-breathing' && (
              <div className="space-y-10 text-center py-2">
                {showTutorial ? (
                  <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 space-y-8">
                    <div className="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto text-indigo-600 shadow-sm border border-slate-200">

      return (
        <div className="min-h-screen bg-slate-50 flex justify-center overflow-x-hidden antialiased text-slate-900">
          <div className="w-full max-w-md bg-white shadow-2xl relative min-h-screen">
            {view === 'landing' && <LandingView setView={setView} />}

            {(view === 'login-s' || view === 'login-c') && (
              <LoginView
                type={view === 'login-s' ? 's' : 'c'}
                setView={setView}
                inputs={inputs}
                setInputs={setInputs}
                handleLogin={handleLogin}
                msg={msg}
              />
            )}

            {view === 'dash' && (
              <StudentDashboard
                user={user}
                day={day}
                setDay={setDay}
                status={status}
                setView={setView}
                currentActivity={currentActivity}
                isCompleted={isCompleted}
                setUser={setUser}
              />
            )}

            {view === 'survey' && (
              <SurveyView
                status={status}
                setView={setView}
                responses={surveyResponses}
                setResponses={setSurveyResponses}
                onSubmit={submitSurvey}
              />
            )}

            {view === 'score-result' && (
              <ScoreResultView status={status} setView={setView} setResponses={setSurveyResponses} />
            )}

            {view === 'activity' && (
              <InteractiveActivity
                currentActivity={currentActivity}
                setView={setView}
                completeActivity={completeActivity}
              />
            )}

            {view === 'counselor' && (
              <CounselorDashboard setView={setView} setUser={setUser} status={status} />
            )}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
